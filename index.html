<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de Proveedor Global</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-6xl mx-auto p-4">
  <h1 class="text-xl font-semibold text-gray-900 mb-4">Catálogo de Proveedor Global</h1>

  <div class="bg-white rounded-2xl border border-gray-100 p-3 mb-3 flex items-center justify-between flex-wrap gap-2">
    <div>
      <span class="font-medium text-sm text-gray-900">Productos</span>
      <p id="contador" class="text-xs text-gray-400 mt-0.5">Cargando...</p>
    </div>
    <input id="busqueda" placeholder="Buscar por modelo, marca o título..."
      class="border border-gray-200 rounded-lg px-3 py-2 text-sm w-full sm:w-80">
  </div>

  <div class="flex items-center justify-between mb-2 flex-wrap gap-2">
    <div class="flex gap-2 flex-wrap">
      <select id="filtroCategoria" class="px-3 py-1.5 rounded-full text-xs border font-medium bg-white text-gray-600 border-gray-200">
        <option value="todas">Todas las categorías</option>
      </select>
      <select id="filtroMarca" class="px-3 py-1.5 rounded-full text-xs border font-medium bg-white text-gray-600 border-gray-200">
        <option value="todas">Todas las marcas</option>
      </select>
      <button id="btnLimpiar" class="px-3 py-1.5 rounded-full text-xs border font-medium bg-white text-red-500 border-red-200 hidden">
        Limpiar filtros
      </button>
    </div>
    <span id="paginaTexto" class="text-xs text-gray-400"></span>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-xs border-collapse">
        <thead>
          <tr class="bg-gray-50 border-b border-gray-100">
            <th class="text-left p-2 text-gray-400 font-medium">Categoría</th>
            <th class="text-left p-2 text-gray-400 font-medium">Modelo</th>
            <th class="text-left p-2 text-gray-400 font-medium">Marca</th>
            <th class="text-left p-2 text-gray-400 font-medium min-w-[260px]">Título</th>
            <th class="text-center p-2 text-gray-400 font-medium">Existencia</th>
            <th class="text-right p-2 text-purple-600 font-medium bg-purple-50">Precio Lista</th>
            <th class="text-right p-2 text-purple-600 font-medium bg-purple-50">Su Precio</th>
            <th class="text-center p-2 text-gray-400 font-medium">Ficha</th>
          </tr>
        </thead>
        <tbody id="tablaBody">
          <tr><td colspan="8" class="p-6 text-center text-gray-400">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="flex items-center justify-between p-3 border-t border-gray-100">
      <button id="btnAnterior" class="px-3 py-1.5 text-xs border border-gray-200 rounded-lg disabled:opacity-40">← Anterior</button>
      <span id="paginaTexto2" class="text-xs text-gray-400"></span>
      <button id="btnSiguiente" class="px-3 py-1.5 text-xs border border-gray-200 rounded-lg disabled:opacity-40">Siguiente →</button>
    </div>
  </div>
</div>

<!-- Modal de detalle -->
<div id="modal" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50 p-4 hidden">
  <div class="bg-white rounded-2xl w-full max-w-lg shadow-xl">
    <div class="flex items-center justify-between p-4 border-b border-gray-100">
      <h3 id="modalTitulo" class="font-semibold text-gray-900"></h3>
      <button id="btnCerrarModal" class="text-gray-400 hover:text-gray-600 text-xl">✕</button>
    </div>
    <div id="modalContenido" class="p-4 space-y-2 text-sm"></div>
  </div>
</div>

<script>
// =====================================================================
// CONFIGURACIÓN DE SUPABASE
// =====================================================================
const SUPABASE_URL = "https://vhjdftnzccoykhundxfn.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_aqenc-HbuSg21fFt48EfTg_-gnnKXjy";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const PAGE_SIZE = 30;
let pagina = 1;
let totalFilas = 0;
let categoriaSel = "todas";
let marcaSel = "todas";
let busqueda = "";
let debounceTimer = null;

function formatoMoneda(v) {
  if (v === null || v === undefined) return "—";
  return Number(v).toLocaleString("es-MX", { style: "currency", currency: "USD" });
}

function escapeHtml(s) {
  if (s === null || s === undefined) return "";
  return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function cargarCategorias() {
  const { data, error } = await supabase.from("productos_global").select("categoria");
  if (error) { mostrarError(error); return; }
  const unicas = [...new Set(data.map(d => d.categoria))].sort();
  const sel = document.getElementById("filtroCategoria");
  unicas.forEach(c => {
    const opt = document.createElement("option");
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
}

async function cargarMarcas() {
  let q = supabase.from("productos_global").select("marca").not("marca", "is", null);
  if (categoriaSel !== "todas") q = q.eq("categoria", categoriaSel);
  const { data, error } = await q;
  if (error) { mostrarError(error); return; }
  const unicas = [...new Set(data.map(d => d.marca).filter(Boolean))].sort();
  const sel = document.getElementById("filtroMarca");
  sel.innerHTML = '<option value="todas">Todas las marcas</option>';
  unicas.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });
}

function mostrarError(error) {
  document.getElementById("tablaBody").innerHTML =
    `<tr><td colspan="8" class="p-6 text-center text-red-500">Error: ${escapeHtml(error.message)}</td></tr>`;
  document.getElementById("contador").textContent = "Error al cargar";
}

async function cargarProductos() {
  document.getElementById("tablaBody").innerHTML =
    '<tr><td colspan="8" class="p-6 text-center text-gray-400">Cargando...</td></tr>';

  let q = supabase.from("productos_global").select("*", { count: "exact" });
  if (categoriaSel !== "todas") q = q.eq("categoria", categoriaSel);
  if (marcaSel !== "todas") q = q.eq("marca", marcaSel);
  if (busqueda.trim()) {
    q = q.or(`titulo.ilike.%${busqueda}%,modelo.ilike.%${busqueda}%,marca.ilike.%${busqueda}%`);
  }

  const desde = (pagina - 1) * PAGE_SIZE;
  const hasta = desde + PAGE_SIZE - 1;
  const { data, count, error } = await q.order("categoria", { ascending: true }).range(desde, hasta);

  if (error) { mostrarError(error); return; }

  totalFilas = count || 0;
  renderTabla(data || []);
  renderPaginacion();
  document.getElementById("contador").textContent = `${totalFilas.toLocaleString("es-MX")} productos encontrados`;
}

function renderTabla(productos) {
  const body = document.getElementById("tablaBody");
  if (productos.length === 0) {
    body.innerHTML = '<tr><td colspan="8" class="p-6 text-center text-gray-400">Sin resultados para estos filtros</td></tr>';
    return;
  }
  body.innerHTML = productos.map(p => `
    <tr class="border-b border-gray-50">
      <td class="p-2 text-gray-500">${escapeHtml(p.categoria)}</td>
      <td class="p-2 font-medium text-gray-900">${escapeHtml(p.modelo)}</td>
      <td class="p-2 text-gray-700">${escapeHtml(p.marca)}</td>
      <td class="p-2 text-gray-700">${escapeHtml(p.titulo)}</td>
      <td class="p-2 text-center text-gray-700">${escapeHtml(p.existencia)}</td>
      <td class="p-2 text-right bg-purple-50 text-gray-500">${formatoMoneda(p.precio_lista_usd)}</td>
      <td class="p-2 text-right bg-purple-50 font-semibold text-purple-600">${formatoMoneda(p.su_precio)}</td>
      <td class="p-2 text-center">
        <button class="btnVer text-xs bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700" data-id="${p.id}">Ver</button>
      </td>
    </tr>
  `).join("");

  body.querySelectorAll(".btnVer").forEach(btn => {
    btn.addEventListener("click", () => {
      const p = productos.find(x => String(x.id) === btn.dataset.id);
      abrirModal(p);
    });
  });
}

function renderPaginacion() {
  const totalPaginas = Math.max(1, Math.ceil(totalFilas / PAGE_SIZE));
  document.getElementById("paginaTexto").textContent = `Página ${pagina} de ${totalPaginas}`;
  document.getElementById("paginaTexto2").textContent = `${pagina} / ${totalPaginas}`;
  document.getElementById("btnAnterior").disabled = pagina === 1;
  document.getElementById("btnSiguiente").disabled = pagina >= totalPaginas;
}

function abrirModal(p) {
  document.getElementById("modalTitulo").textContent = p.modelo || "";
  document.getElementById("modalContenido").innerHTML = `
    ${p.url_imagen ? `<img src="${escapeHtml(p.url_imagen)}" class="w-full rounded-lg border border-gray-100 mb-2">` : ""}
    <p><span class="text-gray-400">Marca:</span> ${escapeHtml(p.marca)}</p>
    <p><span class="text-gray-400">Categoría:</span> ${escapeHtml(p.categoria)}</p>
    <p><span class="text-gray-400">Título:</span> ${escapeHtml(p.titulo)}</p>
    <p><span class="text-gray-400">Existencia:</span> ${escapeHtml(p.existencia)} &nbsp;|&nbsp; <span class="text-gray-400">En camino:</span> ${escapeHtml(p.en_camino)}</p>
    <p><span class="text-gray-400">Precio de lista:</span> ${formatoMoneda(p.precio_lista_usd)}</p>
    <p><span class="text-gray-400">Precio especial:</span> ${formatoMoneda(p.precio_especial)}</p>
    <p class="font-semibold text-purple-600">Su precio: ${formatoMoneda(p.su_precio)}</p>
    <div class="flex gap-2 pt-2">
      ${p.link_syscom ? `<a href="${escapeHtml(p.link_syscom)}" target="_blank" rel="noreferrer" class="text-xs bg-blue-600 text-white px-3 py-1.5 rounded-lg hover:bg-blue-700">Ver en SYSCOM</a>` : ""}
      ${p.link_privado ? `<a href="${escapeHtml(p.link_privado)}" target="_blank" rel="noreferrer" class="text-xs border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-50">Ficha privada</a>` : ""}
    </div>
  `;
  document.getElementById("modal").classList.remove("hidden");
}

document.getElementById("btnCerrarModal").addEventListener("click", () => {
  document.getElementById("modal").classList.add("hidden");
});
document.getElementById("modal").addEventListener("click", (e) => {
  if (e.target.id === "modal") document.getElementById("modal").classList.add("hidden");
});

document.getElementById("busqueda").addEventListener("input", (e) => {
  busqueda = e.target.value;
  pagina = 1;
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(cargarProductos, 300);
});

document.getElementById("filtroCategoria").addEventListener("change", async (e) => {
  categoriaSel = e.target.value;
  marcaSel = "todas";
  pagina = 1;
  actualizarBotonLimpiar();
  await cargarMarcas();
  cargarProductos();
});

document.getElementById("filtroMarca").addEventListener("change", (e) => {
  marcaSel = e.target.value;
  pagina = 1;
  actualizarBotonLimpiar();
  cargarProductos();
});

document.getElementById("btnLimpiar").addEventListener("click", async () => {
  busqueda = "";
  categoriaSel = "todas";
  marcaSel = "todas";
  pagina = 1;
  document.getElementById("busqueda").value = "";
  document.getElementById("filtroCategoria").value = "todas";
  actualizarBotonLimpiar();
  await cargarMarcas();
  cargarProductos();
});

document.getElementById("btnAnterior").addEventListener("click", () => {
  if (pagina > 1) { pagina--; cargarProductos(); }
});
document.getElementById("btnSiguiente").addEventListener("click", () => {
  pagina++; cargarProductos();
});

function actualizarBotonLimpiar() {
  const activo = busqueda || categoriaSel !== "todas" || marcaSel !== "todas";
  document.getElementById("btnLimpiar").classList.toggle("hidden", !activo);
}

// Inicio
(async function init() {
  await cargarCategorias();
  await cargarMarcas();
  await cargarProductos();
})();
</script>
</body>
</html>
